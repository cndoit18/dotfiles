"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в•ӯ](fg:current_line)\
$os\
$status\
$directory\
$git_branch\
$git_status\
$fill\
$golang\
$nodejs\
$bun\
$deno\
$python\
$java\
$zig\
$rust\
$c\
$cmd_duration\
$time\
$username\
$line_break\
$character\
"""

palette = 'tokyo_night'
add_newline = true
command_timeout = 5000

[palettes.tokyo_night]
foreground = '#D8D8D8'
background = '#1A1B26'
current_line = '#2A2C37'
primary = '#292E42'
box = '#2A2C37'
blue = '#7AA2F7'
cyan = '#7FDBCA'
green = '#98C379'
orange = '#FF9E64'
pink = '#FF75A0'
purple = '#BB80B3'
red = '#F7768E'
yellow = '#E5C07B'
status = "#e23140"

[os]
disabled = false
format = '(fg:current_line)[оӮ¶](fg:red)[$symbol](fg:primary bg:red)[оӮҙ](fg:red)'

[os.symbols]
Alpaquita = "оӘў "
Alpine = "пҢҖ "
AlmaLinux = "пҢқ "
Amazon = "пү° "
Android = "п…» "
Arch = "пҢғ "
Artix = "пҢҹ "
CachyOS = "пҢғ "
CentOS = "пҢ„ "
Debian = "пҢҶ "
DragonFly = "оҠҺ "
Emscripten = "пҲ… "
EndeavourOS = "пҶ— "
Fedora = "пҢҠ "
FreeBSD = "пҢҢ "
Garuda = "у°ӣ“ "
Gentoo = "пҢҚ "
HardenedBSD = "у°һҢ "
Illumos = "у°Ҳё "
Kali = "пҢ§ "
Linux = "пҢҡ "
Mabox = "о¬© "
Macos = "пҢӮ "
Manjaro = "пҢ’ "
Mariner = "пҮҚ "
MidnightBSD = "пҶҶ "
Mint = "пҢҺ "
NetBSD = "пҖӨ "
NixOS = "пҢ“ "
Nobara = "пҺҖ "
OpenBSD = "у°Ҳә "
openSUSE = "пҢ” "
OracleLinux = "у°Ң· "
Pop = "пҢӘ "
Raspbian = "пҢ• "
Redhat = "пҢ– "
RedHatEnterprise = "пҢ– "
RockyLinux = "пҢ« "
Redox = "у°Җҳ "
Solus = "у° і "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Unknown = "пҲӯ "
Void = "пҢ® "
Windows = "у°ҚІ "

[status]
format = "[в”Җ](fg:current_line)[оӮ¶](fg:status)[оҪ¶](fg:primary bg:status)[оӮҙ](fg:status bg:box)[ $status](fg:foreground bg:box)[оӮҙ](fg:box)"
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = "[в”Җ](fg:current_line)[оӮ¶](fg:status)[оҪ¶](fg:primary bg:status)[оӮҙ](fg:status bg:box)[ $pipestatus](fg:foreground bg:box)[оӮҙ](fg:box)"
disabled = false

[directory]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:pink)[у°·Ҹ](fg:primary bg:pink)[оӮҙ](fg:pink bg:box)[ $path](fg:foreground bg:box)[оӮҙ](fg:box)([оӮ¶](fg:status)[$read_only](fg:primary bg:status)[оӮҙ](fg:status bg:box))'
home_symbol = "оӯҶ ~"
truncate_to_repo = true
truncation_length = 3
read_only = 'уұ§ө '
read_only_style = ''

[git_branch]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $branch](fg:foreground bg:box)'
symbol = 'пҗ—'

[git_status]
format = '[$all_status](fg:green bg:box)[оӮҙ](fg:box)'
conflicted = ' ='
up_to_date = ''
untracked = ' ?${count}'
stashed = ' $'
modified = ' !${count}'
staged = ' +'
renamed = ' В»'
deleted = ' вңҳ'
ahead = ' вҮЎ${count}'
diverged = ' вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = ' вҮЈ${count}'
ignore_submodules = true
use_git_executable = true

[nodejs]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'у°Һҷ Node.js'

[bun]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оқҜ Bun'

[deno]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[$symbol](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = "оҹҖ  Deno"

[zig]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[$symbol](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = "оҡ©  Zig"

[rust]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[$symbol](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оһЁ Rust'

[python]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:green)[$symbol](fg:primary bg:green)[оӮҙ](fg:green bg:box)[ (${version} )(\($virtualenv\) )](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңј python'

[java]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red)[$symbol](fg:primary bg:red)[оӮҙ](fg:red bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оңё Java'

[golang]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:red)[$symbol](fg:primary bg:red)[оӮҙ](fg:red bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = "оҳ§ Go"

[c]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:blue)[$symbol](fg:primary bg:blue)[оӮҙ](fg:blue bg:box)[ $version](fg:foreground bg:box)[оӮҙ](fg:box)'
symbol = 'оҳһ C'

[fill]
symbol = 'в”Җ'
style = 'fg:current_line'

[cmd_duration]
min_time = 500
format = '[в”Җ](fg:current_line)[оӮ¶](fg:orange)[пғ§](fg:primary bg:orange)[оӮҙ](fg:orange bg:box)[ $duration](fg:foreground bg:box)[оӮҙ](fg:box)'

[time]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:purple)[у°Ұ–](fg:primary bg:purple)[оӮҙ](fg:purple bg:box)[ $time](fg:foreground bg:box)[оӮҙ](fg:box)'
time_format = '%H:%M'
disabled = false

[username]
format = '[в”Җ](fg:current_line)[оӮ¶](fg:yellow)[пҗ•](fg:primary bg:yellow)[оӮҙ](fg:yellow bg:box)[ $user](fg:foreground bg:box)[оӮҙ](fg:box) '
show_always = true

[character]
format = """
[в•°в”Җ$symbol](fg:current_line) """
success_symbol = '[пғҡ](fg:bold white)'
error_symbol = '[Г—](fg:bold red)'

[profiles]
transient = """$character"""
claude-code = "$claude_model$git_branch$directory$claude_context"

[claude_model]
format = '[в”Җ](fg:current_line)[](fg:purple)[$symbol](fg:primary bg:purple)[](fg:purple bg:box)[ $model](fg:foreground bg:box)[](fg:box) '
symbol = 'рҹӨ–'
style = 'blue'

[claude_context]
format = '[в”Җ](fg:current_line)[](fg:cyan)[$symbol](fg:primary bg:cyan)[](fg:cyan bg:box)[ $input_tokens](fg:foreground bg:box)[](fg:box) '
symbol = 'у°Ӣҷ'
